{% extends "base.html" %}
{% block title %}Bank Sheet{% endblock %}
{% block page_title %}Bank Sheet{% endblock %}
{% block content %}
<div class="d-flex gap-2 mb-3 align-items-center">
  <form class="d-flex gap-2" method="GET">
    <input type="month" name="month" value="{{ month }}" class="form-control form-control-sm" style="width:160px"/>
    <a href="/bank_sheet?month={{ month }}" class="btn btn-sm btn-success">
      <i class="bi bi-file-excel me-1"></i>Download Excel
    </a>
  </form>
</div>
<div class="card p-4 text-center text-muted">
  <i class="bi bi-bank" style="font-size:3rem"></i>
  <p class="mt-2">Click <strong>Download Excel</strong> to get the bank payment sheet for the selected month.</p>
</div>
{% endblock %}
