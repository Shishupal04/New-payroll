<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — PayrollPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { background: #0d1b3e; font-family: 'DM Sans', sans-serif; min-height:100vh; display:grid; place-items:center; }
    .login-wrap {
      background: #fff; border-radius: 16px; padding: 44px 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .brand { display:flex; align-items:center; gap:12px; margin-bottom:30px; }
    .brand-icon { width:44px; height:44px; background:#2563eb; border-radius:10px;
      display:grid; place-items:center; color:#fff; font-size:22px; }
    .brand-name { font-size:1.5rem; font-weight:700; color:#0f2557; }
    .form-label { font-weight:600; font-size:.85rem; color:#374874; }
    .form-control { border-color:#d0d8ee; border-radius:8px; padding:.55rem .9rem; }
    .form-control:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .btn-signin { background:#2563eb; border:none; width:100%; padding:.6rem; border-radius:8px;
      font-weight:700; font-size:.95rem; transition:background .15s; }
    .btn-signin:hover { background:#1d4ed8; }
    .hint { background:#f0f4ff; border-radius:8px; padding:10px 14px; font-size:.78rem; color:#4455a0; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon"><i class="bi bi-buildings"></i></div>
    <div>
      <div class="brand-name">PayrollPro</div>
      <div style="font-size:.78rem;color:#8899bb">HR & Payroll Management</div>
    </div>
  </div>

  <h6 class="fw-bold mb-1" style="color:#1a2744">Welcome back</h6>
  <p class="text-muted mb-4" style="font-size:.85rem">Sign in to your account</p>

  {% if error %}
  <div class="alert alert-danger py-2 mb-3" style="font-size:.85rem">
    <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
        <input type="text" name="username" class="form-control border-start-0 ps-1" placeholder="Enter username" required autofocus/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
        <input type="password" name="password" class="form-control border-start-0 ps-1" placeholder="Enter password" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-signin text-white">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

  <div class="hint mt-4">
    <b>Demo credentials:</b><br/>
    admin / admin123 &nbsp;|&nbsp; hr / hr123 &nbsp;|&nbsp; accountant / acc123
  </div>
</div>
</body>
</html>
