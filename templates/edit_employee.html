{% extends "base.html" %}
{% block title %}Edit Employee{% endblock %}
{% block page_title %}Edit Employee — {{ emp['name'] }}{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header d-flex align-items-center gap-2">
    <a href="/employees" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    Edit: <strong>{{ emp['name'] }}</strong>
  </div>
  <div class="card-body">
    <form method="POST" action="/edit_employee/{{ emp['id'] }}">
      {% include '_emp_form.html' %}
      <hr/>
      <div class="row g-3">
        <div class="col-md-2">
          <label class="form-label">Status</label>
          <select name="status" class="form-select form-select-sm">
            <option {% if emp['status']=='Active' %}selected{% endif %}>Active</option>
            <option {% if emp['status']=='Inactive' %}selected{% endif %}>Inactive</option>
          </select>
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary btn-sm me-2"><i class="bi bi-check-lg me-1"></i>Update Employee</button>
        <a href="/employees" class="btn btn-secondary btn-sm">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
