services:
  - type: web
    name: payroll-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: payroll-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
